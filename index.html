<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>chaT (Dev/Admin)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="maintenance-overlay" style="display: none;">
        <div class="auth-card">
            <h2>🛠 メンテナンス中</h2>
            <p>現在、システムのメンテナンスを行っています。<br>終了までしばらくお待ちください。</p>
            <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">(管理者のみログイン可能です)</p>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">chaT にログイン</h2>
            <input type="text" id="auth-displayname" placeholder="表示名" style="display:none;">
            <input type="text" id="auth-userid" placeholder="ユーザーID">
            <input type="password" id="auth-password" placeholder="パスワード">
            <button onclick="handleAuth()" id="auth-btn">はじめる</button>
            <p onclick="toggleAuthMode()" id="auth-toggle">新規登録はこちら</p>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside id="sidebar">
            <div class="server-name">chaT  ver1.5.3b</div>
            <div class="sidebar-scroll">
                <div class="sidebar-section">公式</div>
                <ul id="official-list">
                    <li onclick="selectChannel('announcement')" data-id="announcement">📢 お知らせ</li>
                </ul>
                <div class="sidebar-section">チャンネル</div>
                <ul id="channel-list">
                    <li onclick="selectChannel('general')" data-id="general"># general</li>
                </ul>
                <div class="sidebar-section">ダイレクトメッセージ</div>
                <div id="dm-search-area">
                    <input type="text" id="search-userid" placeholder="IDで検索...">
                    <button onclick="addContact()">追加</button>
                </div>
                <ul id="user-list"></ul>

                <div id="admin-menu" style="display:none;">
                    <div class="sidebar-section">管理ツール</div>
                    <ul id="admin-action-list">
                        <li onclick="toggleMaintenanceMode()" style="color: #ff4d4f; font-weight: bold;">🛠 メンテナンス切替</li>
                    </ul>
                </div>
            </div>
            <div id="user-info-area">
                <span id="user-display-name"></span>
                <span id="user-userid-label"></span>
                <button onclick="logout()">ログアウト</button>
            </div>
        </aside>

        <main id="chat-container">
            <header id="main-header">
                <button id="menu-btn" onclick="toggleSidebar()">☰</button>
                <span id="display-channel-name"># general</span>
            </header>
            <div id="messages"></div>
            <div id="input-area">
                <textarea id="message-input" placeholder="メッセージを入力..." rows="1"></textarea>
                <button id="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </main>
    </div>
    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
    <script src="app.js"></script>
</body>
</html>
